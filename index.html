<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>London Shows - Catalogue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <h2 class="logo">London<br>Show</h2>
        
        <div class="Menu_Gauche">
            <nav class="main-nav">
                <ul>
                    <li><a href="#"><i class="fa-regular fa-heart"></i> Favoris</a></li>
                    <li><a href="#"><i class="fa-solid fa-magnifying-glass"></i> Recherche</a></li>
                    <li><a href="#"><i class="fa-solid fa-ticket"></i> Mes Tickets</a></li>
                </ul>
            </nav>

            <div class="nav-bottom">
                <a href="#"><i class="fa-solid fa-gear"></i> Parameters</a>
            </div>
        </div>
    </aside>

    <main class="main-content">

        <header class="Titre">
            <h1>A L'AFFICHE PROCHAINEMENT</h1>
            
            <div class="filters">
                <button class="filter-btn"><i class="fa-regular fa-calendar"></i> Filtrer par mois</button>
                <button class="filter-btn"><i class="fa-solid fa-filter"></i> Filtrer par Type</button>
            </div>
        </header>

        <div class="grille">

            <div class="carte">
                <img src="https://makerslab.em-lyon.com/dww/data/shows/wicked.jpg"  class="image">
                <h3>Wicked</h3>
            </div>

            <div class="carte">
                <img src="https://makerslab.em-lyon.com/dww/data/shows/pride-and-prejudice-sort-of.jpg" class="image">
                <h3>Pride and Prejudice</h3>
            </div>

            <div class="carte">
                <img src="https://makerslab.em-lyon.com/dww/data/shows/the-play-that-goes-wrong.jpg"  class="image">
                <h3>The Play That Goes Wrong</h3>
            </div>

            <div class="carte">
                <img src="https://makerslab.em-lyon.com/dww/data/shows/dear-evan-hansen.jpg"  class="image">
                <h3>Dear Evan Hansen</h3>
            </div>

            <div class="carte">
                <img src="https://makerslab.em-lyon.com/dww/data/shows/the-mirror-and-the-light.jpg"  class="image">
                <h3>The Mirror and the Light</h3>
            </div>

            <div class="carte">
                <img src="https://makerslab.em-lyon.com/dww/data/shows/oleanna.jpg" class="image">
                <h3>Oleanna</h3>
            </div>

        </div>

    </main>
<script src="script.js" defer></script>
